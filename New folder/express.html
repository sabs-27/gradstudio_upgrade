<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express.js Unique 3D Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Fira+Code:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-width: 850px;
            --card-height: 480px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3D Scene Setup */
        .scene {
            perspective: 3000px;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Card Wrapper - Flat Screen */
        .card-wrapper {
            position: relative;
            width: var(--card-width);
            height: var(--card-height);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Interactive Hover */
        .scene:hover .card-wrapper {
            transform: scale(1.02) translateY(-10px);
        }

        /* The Card Itself - Deep Slate/Obsidian Gradient */
        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: radial-gradient(circle at 60% 40%, #2a2b36 0%, #111218 50%, #050508 100%);
            /* Smooth flat shadow */
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.5),
                0 15px 25px rgba(0, 0, 0, 0.4),
                inset 1px 1px 4px rgba(255, 255, 255, 0.15),
                inset -2px -2px 8px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        /* Header (Custom Logo & Text) */
        .header {
            position: absolute;
            top: 50px;
            left: 60px;
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 20;
            pointer-events: none;
        }

        /* Sleek Express "ex" Badge Logo */
        .custom-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3.5px solid #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1), inset 0 2px 10px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .custom-logo span {
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1.5px;
            line-height: 1;
            margin-top: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .header h1 {
            color: #ffffff;
            font-size: 52px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        /* Subtitle representing the pipeline */
        .subtitle {
            position: absolute;
            top: 115px;
            left: 144px;
            color: #38bdf8;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            opacity: 0.9;
            z-index: 20;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);
        }

        /* Master SVG for all Background Graphics */
        .graphics-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

    </style>
</head>
<body>

<div class="scene">
    <div class="card-wrapper">
        <div class="card">
            
            <!-- Custom Badge Logo and Title -->
            <div class="header">
                <div class="custom-logo">
                    <span>ex</span>
                </div>
                <h1>Express</h1>
            </div>
            <div class="subtitle">app.use( /router )</div>

            <!-- Complex Vector Graphics -->
            <svg class="graphics-layer" viewBox="0 0 850 480" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <!-- Glowing Filters -->
                    <filter id="heavy-glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="15" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="6" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                    <filter id="core-glow">
                        <feGaussianBlur stdDeviation="2" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <filter id="blur-glass">
                        <feGaussianBlur stdDeviation="4"/>
                    </filter>

                    <!-- Gradients for the Routing Prism & Glass Elements -->
                    <linearGradient id="glass-tube" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
                        <stop offset="30%" stop-color="#ffffff" stop-opacity="0.05"/>
                        <stop offset="70%" stop-color="#38bdf8" stop-opacity="0.05"/>
                        <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
                    </linearGradient>

                    <linearGradient id="prism-face-top" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#e2e8f0"/>
                        <stop offset="100%" stop-color="#94a3b8"/>
                    </linearGradient>
                    <linearGradient id="prism-face-left" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#64748b"/>
                        <stop offset="100%" stop-color="#334155"/>
                    </linearGradient>
                    <linearGradient id="prism-face-right" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#1e293b"/>
                        <stop offset="100%" stop-color="#0f172a"/>
                    </linearGradient>
                    
                    <linearGradient id="data-stream-main" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
                        <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
                        <stop offset="100%" stop-color="#38bdf8" stop-opacity="1"/>
                    </linearGradient>
                </defs>

                <!-- ================= BACKGROUND: HIGH SPEED NETWORK ENVIRONMENT ================= -->
                <!-- Deep Ambient Backlights -->
                <circle cx="550" cy="250" r="250" fill="#38bdf8" opacity="0.1" filter="url(#heavy-glow)"/>
                <circle cx="200" cy="300" r="180" fill="#ffffff" opacity="0.05" filter="url(#heavy-glow)"/>
                <circle cx="750" cy="400" r="200" fill="#0ea5e9" opacity="0.08" filter="url(#heavy-glow)"/>

                <!-- Speed/Data Lines spanning the background -->
                <g fill="none" stroke-linecap="round" opacity="0.4">
                    <path d="M-50,150 L300,150" stroke="#475569" stroke-width="2" stroke-dasharray="10 20"/>
                    <path d="M100,420 L400,420" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 15"/>
                    <path d="M600,100 L950,100" stroke="#38bdf8" stroke-width="2" stroke-dasharray="20 30" filter="url(#neon-glow)" opacity="0.5"/>
                    <path d="M700,450 L900,450" stroke="#ffffff" stroke-width="1" stroke-dasharray="8 12" filter="url(#core-glow)"/>
                </g>

                <!-- Floating Code Typography (Routing concepts) -->
                <g font-family="'Fira Code', monospace" font-size="16" font-weight="700" fill="#94a3b8" filter="url(#neon-glow)" opacity="0.5">
                    <text x="80" y="220" transform="rotate(-5, 80, 220)">req.body</text>
                    <text x="250" y="380" font-size="20" fill="#38bdf8" opacity="0.7">next()</text>
                    <text x="700" y="150" transform="rotate(10, 700, 150)">res.json()</text>
                    <text x="750" y="360" font-size="14" fill="#ffffff" opacity="0.4">status(200)</text>
                    <text x="450" y="120" font-size="12" letter-spacing="4" opacity="0.3">HTTP / 1.1</text>
                </g>

                <!-- ================= FOREGROUND: THE MIDDLEWARE PIPELINE ================= -->
                <!-- The Main Incoming Data Pipeline -->
                <g transform="translate(0, 260)">
                    
                    <!-- The Glass Tunnel Core -->
                    <path d="M-50,-20 L480,-20 L480,20 L-50,20 Z" fill="url(#glass-tube)"/>
                    <path d="M-50,-20 L480,-20" stroke="#ffffff" stroke-width="2" opacity="0.5" filter="url(#neon-glow)"/>
                    <path d="M-50,20 L480,20" stroke="#38bdf8" stroke-width="2" opacity="0.3"/>

                    <!-- The High-Speed Inner Laser (The Request) -->
                    <path d="M-50,0 L480,0" stroke="url(#data-stream-main)" stroke-width="6" filter="url(#heavy-glow)"/>
                    <path d="M-50,0 L480,0" stroke="#ffffff" stroke-width="2" filter="url(#core-glow)"/>
                    
                    <!-- Data Packets zipping through the tunnel -->
                    <circle cx="50" cy="0" r="4" fill="#ffffff" filter="url(#core-glow)"/>
                    <circle cx="150" cy="0" r="5" fill="#38bdf8" filter="url(#core-glow)"/>
                    <circle cx="350" cy="0" r="3" fill="#ffffff" filter="url(#core-glow)"/>

                    <!-- Middleware Filter Rings -->
                    <!-- Ring 1 (Auth) -->
                    <g transform="translate(120, 0)">
                        <ellipse cx="0" cy="0" rx="12" ry="40" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.8" filter="url(#neon-glow)"/>
                        <ellipse cx="0" cy="0" rx="12" ry="40" fill="none" stroke="#ffffff" stroke-width="1"/>
                        <!-- Inner energy field -->
                        <ellipse cx="0" cy="0" rx="8" ry="35" fill="#38bdf8" opacity="0.2" filter="url(#heavy-glow)"/>
                    </g>
                    
                    <!-- Ring 2 (Parser) -->
                    <g transform="translate(260, 0)">
                        <ellipse cx="0" cy="0" rx="12" ry="40" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6" filter="url(#neon-glow)"/>
                        <ellipse cx="0" cy="0" rx="12" ry="40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
                    </g>

                    <!-- Ring 3 (Validation) -->
                    <g transform="translate(400, 0)">
                        <ellipse cx="0" cy="0" rx="12" ry="40" fill="none" stroke="#0ea5e9" stroke-width="4" opacity="0.9" filter="url(#heavy-glow)"/>
                        <ellipse cx="0" cy="0" rx="12" ry="40" fill="none" stroke="#ffffff" stroke-width="1.5"/>
                    </g>
                </g>


                <!-- ================= FOREGROUND: THE ROUTING PRISM ================= -->
                <!-- The central 3D isometric structure that splits the pipeline -->
                <g transform="translate(560, 260)">
                    
                    <!-- Base Shadow -->
                    <ellipse cx="0" cy="80" rx="90" ry="25" fill="#000000" opacity="0.9" filter="url(#heavy-glow)"/>
                    <ellipse cx="0" cy="80" rx="140" ry="40" fill="#38bdf8" opacity="0.1" filter="url(#heavy-glow)"/>

                    <!-- Outgoing Routed Data Paths (Behind the Prism) -->
                    <!-- Path 1: Top Right (GET) -->
                    <g filter="url(#neon-glow)">
                        <path d="M0,0 Q100,-80 300,-150" fill="none" stroke="#38bdf8" stroke-width="4" opacity="0.8"/>
                        <path d="M0,0 Q100,-80 300,-150" fill="none" stroke="#ffffff" stroke-width="1.5"/>
                        <circle cx="150" cy="-97" r="4" fill="#ffffff" filter="url(#core-glow)"/>
                        <text x="240" y="-120" font-family="'Fira Code'" font-size="12" font-weight="700" fill="#7dd3fc" opacity="0.8">GET /</text>
                    </g>
                    
                    <!-- Path 2: Straight Right (POST) -->
                    <g filter="url(#heavy-glow)">
                        <path d="M0,0 L350,20" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.9"/>
                        <path d="M0,0 L350,20" fill="none" stroke="#ffffff" stroke-width="2" filter="url(#core-glow)"/>
                        <path d="M50,1 L120,5" stroke="#38bdf8" stroke-width="8" opacity="0.8"/>
                        <text x="240" y="10" font-family="'Fira Code'" font-size="12" font-weight="700" fill="#ffffff" opacity="0.9">POST /api</text>
                    </g>
                    
                    <!-- Path 3: Bottom Right (PUT/DELETE) -->
                    <g filter="url(#neon-glow)">
                        <path d="M0,0 Q120,100 300,160" fill="none" stroke="#0ea5e9" stroke-width="3" opacity="0.6"/>
                        <path d="M0,0 Q120,100 300,160" fill="none" stroke="#bae6fd" stroke-width="1"/>
                        <circle cx="200" cy="118" r="3" fill="#ffffff" filter="url(#core-glow)"/>
                        <text x="230" y="150" font-family="'Fira Code'" font-size="12" font-weight="700" fill="#38bdf8" opacity="0.7">PUT /id</text>
                    </g>


                    <!-- The Core Isometric Prism (The Router Instance) -->
                    <g transform="scale(1.2)" filter="drop-shadow(0 15px 20px rgba(0,0,0,0.8))">
                        <!-- Bottom Hexagon Plinth -->
                        <g transform="translate(0, 45) scale(1.1)">
                            <path d="M0,-20 L34.64,-10 L0,0 L-34.64,-10 Z" fill="#0f172a"/>
                            <path d="M-34.64,-10 L0,0 L0,20 L-34.64,10 Z" fill="#020617"/>
                            <path d="M0,0 L34.64,-10 L34.64,10 L0,20 Z" fill="#000000"/>
                            <!-- Plinth glowing edge -->
                            <path d="M-34.64,-10 L0,0 L34.64,-10" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
                        </g>

                        <!-- Main Hexagonal Core Container -->
                        <!-- Top Face -->
                        <path d="M0,-40 L34.64,-20 L0,0 L-34.64,-20 Z" fill="url(#prism-face-top)"/>
                        <!-- Left Face -->
                        <path d="M-34.64,-20 L0,0 L0,40 L-34.64,20 Z" fill="url(#prism-face-left)"/>
                        <!-- Right Face -->
                        <path d="M0,0 L34.64,-20 L34.64,20 L0,40 Z" fill="url(#prism-face-right)"/>

                        <!-- Sharp Metallic Edges -->
                        <g fill="none" stroke-width="1.5" opacity="0.9" filter="url(#core-glow)">
                            <path d="M0,-40 L-34.64,-20 L0,0 Z" stroke="#ffffff"/>
                            <path d="M0,-40 L34.64,-20 L0,0 Z" stroke="#cbd5e1" opacity="0.6"/>
                            <path d="M0,0 L0,40" stroke="#f8fafc"/>
                        </g>
                        <!-- Left vertical edge highlight -->
                        <path d="M-34.64,-20 L-34.64,20" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
                        
                        <!-- Internal Glowing Heart (The dispatcher logic) -->
                        <g transform="translate(0, -5)">
                            <path d="M0,-15 L15,-7 L0,0 L-15,-7 Z" fill="#ffffff" filter="url(#heavy-glow)"/>
                            <path d="M0,-15 L15,-7 L0,0 L-15,-7 Z" fill="#38bdf8" filter="url(#core-glow)"/>
                        </g>
                    </g>
                    
                    <!-- Glowing Aura encompassing the prism -->
                    <circle cx="0" cy="0" r="70" fill="none" stroke="#38bdf8" stroke-width="0.5" opacity="0.4" stroke-dasharray="4 8" filter="url(#neon-glow)"/>
                    <circle cx="0" cy="0" r="90" fill="none" stroke="#ffffff" stroke-width="0.2" opacity="0.2"/>

                </g>

            </svg>
        </div>
    </div>
</div>

</body>
</html>
