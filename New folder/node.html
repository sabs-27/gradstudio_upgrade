<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React 3D Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-width: 850px;
            --card-height: 480px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3D Scene Setup */
        .scene {
            perspective: 3000px;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Card Wrapper - Flat Screen */
        .card-wrapper {
            position: relative;
            width: var(--card-width);
            height: var(--card-height);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Interactive Hover */
        .scene:hover .card-wrapper {
            transform: scale(1.02) translateY(-10px);
        }

        /* The Card Itself */
        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: radial-gradient(circle at 80% 50%, #0a2552 0%, #061633 40%, #020813 100%);
            /* Smooth flat shadow */
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.35),
                0 15px 25px rgba(0, 0, 0, 0.25),
                inset 1px 1px 3px rgba(255, 255, 255, 0.3),
                inset -2px -2px 6px rgba(0, 0, 0, 0.7);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
        }

        /* Header (Logo & Text) */
        .header {
            position: absolute;
            top: 50px;
            left: 60px;
            display: flex;
            align-items: center;
            gap: 22px;
            z-index: 20;
            pointer-events: none;
        }

        .header svg {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }

        .header h1 {
            color: #ffffff;
            font-size: 54px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -1.5px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Master SVG for all Background Graphics & 3D React Atom */
        .graphics-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

    </style>
</head>
<body>

<div class="scene">
    <div class="card-wrapper">
        <div class="card">
            
            <!-- Logo and Title -->
            <div class="header">
                <svg viewBox="-11.5 -10.23174 23 20.46348" fill="#38bdf8">
                    <circle cx="0" cy="0" r="2.05"/>
                    <g stroke="#38bdf8" stroke-width="1.2" fill="none">
                        <ellipse rx="11" ry="4.2"/>
                        <ellipse rx="11" ry="4.2" transform="rotate(60)"/>
                        <ellipse rx="11" ry="4.2" transform="rotate(120)"/>
                    </g>
                </svg>
                <h1>React</h1>
            </div>

            <!-- Complex Vector Graphics -->
            <svg class="graphics-layer" viewBox="0 0 850 480" preserveAspectRatio="xMidYMid slice">
                <defs>
                    <!-- Filters for glowing effects -->
                    <filter id="heavy-glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="15" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="6" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                    <filter id="light-blur">
                        <feGaussianBlur stdDeviation="2" />
                    </filter>
                    <filter id="atom-core-glow">
                        <feGaussianBlur stdDeviation="8" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>

                    <!-- Atom Ring Gradient -->
                    <linearGradient id="ring-glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#38bdf8" stop-opacity="1"/>
                        <stop offset="50%" stop-color="#0284c7" stop-opacity="0.3"/>
                        <stop offset="100%" stop-color="#38bdf8" stop-opacity="1"/>
                    </linearGradient>
                </defs>

                <!-- ================= BACKGROUND WAVES ================= -->
                <!-- Deep ambient glows -->
                <circle cx="650" cy="250" r="180" fill="#0284c7" opacity="0.2" filter="url(#heavy-glow)"/>
                <circle cx="200" cy="400" r="140" fill="#1d4ed8" opacity="0.3" filter="url(#heavy-glow)"/>
                <circle cx="800" cy="100" r="120" fill="#38bdf8" opacity="0.15" filter="url(#heavy-glow)"/>

                <!-- Network Grid (Abstract wavy mesh) -->
                <g stroke="#38bdf8" fill="none" stroke-width="0.8" opacity="0.15">
                    <!-- Horizontal-ish curves -->
                    <path d="M-50,380 Q150,300 400,420 T900,380" />
                    <path d="M-50,400 Q200,320 450,450 T900,400" />
                    <path d="M-50,420 Q250,350 500,470 T900,420" />
                    <path d="M-50,440 Q300,380 550,490 T900,440" />
                    
                    <!-- Vertical-ish crossing curves -->
                    <path d="M200,250 Q300,400 250,550" />
                    <path d="M300,250 Q450,400 350,550" />
                    <path d="M400,250 Q600,400 450,550" />
                    <path d="M500,200 Q700,400 550,550" />
                    <path d="M600,200 Q800,400 650,550" />
                    <path d="M700,150 Q900,400 750,550" />
                </g>

                <!-- Dotted network intersections and scattered particles -->
                <g fill="#7dd3fc" opacity="0.6" filter="url(#soft-glow)">
                    <!-- Grid nodes -->
                    <circle cx="235" cy="370" r="1.5"/><circle cx="370" cy="385" r="1.5"/><circle cx="510" cy="430" r="1.5"/>
                    <circle cx="300" cy="415" r="1.5"/><circle cx="450" cy="440" r="1.5"/><circle cx="630" cy="415" r="1.5"/>
                    <circle cx="690" cy="360" r="2.5" fill="#fff" opacity="0.9"/>
                    
                    <!-- Ambient floating dust -->
                    <circle cx="150" cy="200" r="1.5"/>
                    <circle cx="250" cy="120" r="2.5" opacity="0.4"/>
                    <circle cx="450" cy="180" r="1.5"/>
                    <circle cx="480" cy="280" r="2" fill="#fff" opacity="0.8"/>
                    <circle cx="750" cy="100" r="1"/>
                    <circle cx="820" cy="350" r="2"/>
                </g>

                <!-- High-intensity Glowing Swoosh Wave -->
                <!-- 1. The thick blurred base for intense glow -->
                <path d="M-50,370 Q250,400 450,260 T900,-30" stroke="#0ea5e9" stroke-width="16" fill="none" filter="url(#heavy-glow)" opacity="0.4"/>
                <!-- 2. The core sharp bright line -->
                <path d="M-50,370 Q250,400 450,260 T900,-30" stroke="#7dd3fc" stroke-width="3" fill="none" filter="url(#soft-glow)" opacity="0.9"/>
                <!-- 3. A secondary delicate trailing line -->
                <path d="M-50,350 Q220,380 430,230 T900,-60" stroke="#38bdf8" stroke-width="1" fill="none" opacity="0.6"/>
                <!-- 4. Tertiary intersecting wave -->
                <path d="M-50,420 Q300,350 600,180 T950,50" stroke="#0284c7" stroke-width="2" fill="none" filter="url(#light-blur)" opacity="0.5"/>


                <!-- ================= 3D REACT ATOM GRAPHIC ================= -->
                <!-- Entire group moved to the right side of the card -->
                <g transform="translate(620, 240)">
                    
                    <!-- Shadow cast by the atom onto the ambient background -->
                    <ellipse cx="-10" cy="120" rx="90" ry="25" fill="#000000" opacity="0.7" filter="url(#heavy-glow)"/>

                    <!-- Subtle glowing aura behind the atom -->
                    <circle cx="0" cy="0" r="100" fill="#0284c7" opacity="0.2" filter="url(#heavy-glow)"/>

                    <!-- The 3 Orbital Rings -->
                    <!-- Outer thick blurred rings for volume -->
                    <g stroke="url(#ring-glow-grad)" stroke-width="8" fill="none" filter="url(#heavy-glow)" opacity="0.6">
                        <ellipse rx="110" ry="40" transform="rotate(30)" />
                        <ellipse rx="110" ry="40" transform="rotate(90)" />
                        <ellipse rx="110" ry="40" transform="rotate(150)" />
                    </g>
                    
                    <!-- Inner sharp sharp rings -->
                    <g stroke="#38bdf8" stroke-width="2" fill="none" filter="url(#light-blur)">
                        <ellipse rx="110" ry="40" transform="rotate(30)" />
                        <ellipse rx="110" ry="40" transform="rotate(90)" />
                        <ellipse rx="110" ry="40" transform="rotate(150)" />
                    </g>
                    
                    <!-- Ultra sharp bright core of the rings -->
                    <g stroke="#bae6fd" stroke-width="0.75" fill="none" opacity="0.9">
                        <ellipse rx="110" ry="40" transform="rotate(30)" />
                        <ellipse rx="110" ry="40" transform="rotate(90)" />
                        <ellipse rx="110" ry="40" transform="rotate(150)" />
                    </g>

                    <!-- Orbiting Electrons (Nodes) -->
                    <g filter="url(#soft-glow)">
                        <circle cx="95" cy="20" r="5" fill="#ffffff" />
                        <circle cx="-20" cy="95" r="4.5" fill="#e0f2fe" />
                        <circle cx="-75" cy="-75" r="5.5" fill="#ffffff" />
                        <circle cx="10" cy="-105" r="3" fill="#bae6fd" />
                    </g>

                    <!-- The Central Nucleus -->
                    <!-- Dark inner shadow/depth -->
                    <circle cx="0" cy="0" r="18" fill="#0284c7" filter="url(#heavy-glow)"/>
                    <!-- Main glowing sphere -->
                    <circle cx="0" cy="0" r="14" fill="#38bdf8" filter="url(#atom-core-glow)"/>
                    <!-- Bright white core highlight -->
                    <circle cx="-2" cy="-2" r="6" fill="#ffffff" filter="url(#light-blur)" opacity="0.9"/>
                </g>

            </svg>
        </div>
    </div>
</div>

</body>
</html>
