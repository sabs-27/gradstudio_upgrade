<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERN Stack 3D UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-width: 540px;
            --card-height: 340px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3D Scene Setup */
        .scene {
            perspective: 3000px;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .deck {
            position: relative;
            width: var(--card-width);
            height: var(--card-height);
            transform-style: preserve-3d;
            /* 1. Rotate to create isometric angle 
               2. Translate (-220px, 220px) to keep the fanned-out deck perfectly centered on screen
               3. Scale down to fit 
            */
            transform: rotateX(55deg) rotateZ(-40deg) translate3d(-220px, 220px, 0) scale(0.85);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Interactive Hover - Fans them out even more */
        .scene:hover .deck {
            transform: rotateX(52deg) rotateZ(-38deg) translate3d(-220px, 220px, 0) scale(0.9);
        }
        
        .scene:hover .card.mern    { transform: translate3d(-10px, 10px, 80px); }
        .scene:hover .card.mongo   { transform: translate3d(120px, -120px, 40px); }
        .scene:hover .card.express { transform: translate3d(250px, -250px, 0px); }
        .scene:hover .card.react   { transform: translate3d(380px, -380px, -40px); }
        .scene:hover .card.node    { transform: translate3d(510px, -510px, -80px); }

        /* Base Card Styling */
        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: var(--card-width);
            height: var(--card-height);
            border-radius: 20px;
            box-sizing: border-box;
            overflow: hidden;
            /* Precise isometric shadow */
            box-shadow: 
                -20px 20px 30px rgba(0, 0, 0, 0.4),
                inset 1px 1px 2px rgba(255, 255, 255, 0.3),
                inset -1px -1px 2px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            color: white;
            display: flex;
            flex-direction: column;
            background-color: #111;
        }

        /* Bottom-most card has a larger shadow to ground the stack */
        .card.node {
            box-shadow: 
                -40px 40px 60px rgba(0, 0, 0, 0.6),
                inset 1px 1px 2px rgba(255, 255, 255, 0.3);
        }

        /* Proper Spacing Math (No Parallax Blocks):
           Spread heavily on X and Y, with gentle Z stepping.
        */
        .card.mern    { transform: translate3d(0px, 0px, 80px); }
        .card.mongo   { transform: translate3d(110px, -110px, 40px); }
        .card.express { transform: translate3d(220px, -220px, 0px); }
        .card.react   { transform: translate3d(330px, -330px, -40px); }
        .card.node    { transform: translate3d(440px, -440px, -80px); }

        /* Background Colors / Gradients to match the image exactly */
        .card.node {
            background: radial-gradient(circle at 80% 50%, #0d381c, #051208);
        }
        .card.react {
            background: radial-gradient(circle at 80% 50%, #0a2552, #040d1c);
        }
        .card.express {
            background: radial-gradient(circle at 80% 50%, #24252b, #0f1014);
        }
        .card.mongo {
            background: radial-gradient(circle at 80% 50%, #0b3d1f, #051409);
        }
        .card.mern {
            background: #060b14;
        }

        /* Internal Layout for Backend Cards (2-5) */
        .card-header {
            padding: 35px 45px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 26px;
            font-weight: 500;
            letter-spacing: -0.5px;
            z-index: 10;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg-graphic {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 260px;
            height: 260px;
            opacity: 0.85;
            pointer-events: none;
        }

        /* specific to front card (MERN) */
        .mern-content {
            position: absolute;
            top: 50%;
            left: 50px;
            transform: translateY(-50%);
            z-index: 10;
        }

        .mern-subtitle {
            font-size: 38px;
            font-weight: 400;
            color: #f3f4f6;
            margin: 0 0 -5px 0;
            letter-spacing: -0.5px;
        }

        .mern-title {
            font-size: 100px;
            font-weight: 800;
            margin: 0 0 20px 0;
            line-height: 1;
            /* Vivid gradient exactly like the image */
            background: linear-gradient(90deg, #4ade80 0%, #06b6d4 40%, #3b82f6 80%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -3px;
        }

        .mern-badges {
            display: flex;
            gap: 18px;
        }

        .badge {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
        }

        .badge svg {
            width: 28px;
            height: 28px;
        }

        /* Glowing SVG Wave Background */
        .mern-wave-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 60%);
            bottom: -150px;
            left: -50px;
            filter: blur(50px);
            z-index: 0;
        }
    </style>
</head>
<body>

<div class="scene">
    <div class="deck">

        <!-- CARD 5: Node.js (Bottom-most) -->
        <div class="card node">
            <div class="card-header">
                <div class="header-icon">
                    <svg viewBox="0 0 128 128" fill="#4ade80">
                        <path d="M63.886 1.134C62.062 1.134 60.301 1.6 58.74 2.45L9.303 29.58A10.87 10.87 0 0 0 3.88 38.65v50.69a10.87 10.87 0 0 0 5.424 9.07l49.436 27.13a10.87 10.87 0 0 0 10.518 0l49.436-27.13a10.87 10.87 0 0 0 5.424-9.07V38.65a10.87 10.87 0 0 0-5.424-9.07L69.257 2.45c-1.56-.85-3.32-1.316-5.37-1.316Z"/>
                    </svg>
                </div>
                Node.js
            </div>
            <!-- Node Cube Graphic -->
            <svg class="bg-graphic" viewBox="0 0 200 200">
                <defs>
                    <linearGradient id="cube-top" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#4ade80" stop-opacity="0.9"/>
                        <stop offset="100%" stop-color="#22c55e" stop-opacity="0.6"/>
                    </linearGradient>
                    <linearGradient id="cube-left" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#16a34a" stop-opacity="1"/>
                        <stop offset="100%" stop-color="#15803d" stop-opacity="0.7"/>
                    </linearGradient>
                    <linearGradient id="cube-right" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#14532d" stop-opacity="0.9"/>
                        <stop offset="100%" stop-color="#064e3b" stop-opacity="0.5"/>
                    </linearGradient>
                </defs>
                <g transform="translate(100,100) scale(1.8)">
                    <!-- Outer glows -->
                    <path d="M0,-35 L30,-17 L0,0 L-30,-17 Z" fill="url(#cube-top)" filter="drop-shadow(0 0 10px rgba(74,222,128,0.3))"/>
                    <path d="M-30,-17 L0,0 L0,35 L-30,17 Z" fill="url(#cube-left)"/>
                    <path d="M0,0 L30,-17 L30,17 L0,35 Z" fill="url(#cube-right)"/>
                    <!-- Edges -->
                    <path d="M0,-35 L-30,-17 L0,0 Z" fill="none" stroke="#86efac" stroke-width="1.5" opacity="0.6"/>
                    <path d="M0,0 L0,35" fill="none" stroke="#86efac" stroke-width="1.5" opacity="0.4"/>
                    <path d="M0,-35 L30,-17 L0,0 Z" fill="none" stroke="#86efac" stroke-width="1.5" opacity="0.6"/>
                </g>
            </svg>
        </div>

        <!-- CARD 4: React -->
        <div class="card react">
            <div class="card-header">
                <div class="header-icon">
                    <svg viewBox="-11.5 -10.23174 23 20.46348" fill="#38bdf8">
                        <circle cx="0" cy="0" r="2.05"/>
                        <g stroke="#38bdf8" stroke-width="1" fill="none">
                            <ellipse rx="11" ry="4.2"/>
                            <ellipse rx="11" ry="4.2" transform="rotate(60)"/>
                            <ellipse rx="11" ry="4.2" transform="rotate(120)"/>
                        </g>
                    </svg>
                </div>
                React
            </div>
            <!-- React Atom Graphic -->
            <svg class="bg-graphic" viewBox="0 0 200 200">
                <defs>
                    <filter id="react-glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="8" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                    </filter>
                </defs>
                <g transform="translate(100,100) scale(2.4)" filter="url(#react-glow)" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.8">
                    <ellipse rx="35" ry="12" transform="rotate(30)" />
                    <ellipse rx="35" ry="12" transform="rotate(90)" />
                    <ellipse rx="35" ry="12" transform="rotate(150)" />
                    <circle r="6" fill="#38bdf8" stroke="none" />
                </g>
                <circle cx="60" cy="50" r="2.5" fill="#7dd3fc" filter="url(#react-glow)" opacity="0.8"/>
                <circle cx="160" cy="150" r="1.5" fill="#bae6fd" filter="url(#react-glow)" opacity="0.6"/>
            </svg>
        </div>

        <!-- CARD 3: Express -->
        <div class="card express">
            <div class="card-header">
                <div class="header-icon" style="border-radius: 50%; border: 2px solid white; box-sizing: border-box;">
                    <span style="font-size: 16px; font-weight: 800; line-height: 1; letter-spacing: -1px; margin-top: 1px;">ex</span>
                </div>
                Express
            </div>
            <!-- Express Network Graphic -->
            <svg class="bg-graphic" viewBox="0 0 200 200">
                <g transform="translate(10, 10) scale(1.1)">
                    <path d="M20,100 C60,30 110,130 150,60" fill="none" stroke="#6b7280" stroke-width="3" opacity="0.8"/>
                    <path d="M40,150 C90,160 100,80 150,130" fill="none" stroke="#4b5563" stroke-width="2" opacity="0.6"/>
                    <path d="M20,100 L40,150 L100,80 L150,60 L150,130 Z" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    
                    <circle cx="20" cy="100" r="7" fill="#d1d5db"/>
                    <circle cx="150" cy="60" r="9" fill="#f3f4f6"/>
                    <circle cx="40" cy="150" r="5" fill="#9ca3af"/>
                    <circle cx="150" cy="130" r="7" fill="#e5e7eb"/>
                    <circle cx="100" cy="80" r="14" fill="#e5e7eb" opacity="0.1" stroke="#fff" stroke-width="2"/>
                    <circle cx="100" cy="80" r="5" fill="#ffffff"/>
                </g>
            </svg>
        </div>

        <!-- CARD 2: MongoDB -->
        <div class="card mongo">
            <div class="card-header">
                <div class="header-icon">
                    <svg viewBox="0 0 100 100">
                        <path d="M50,10 C50,10 20,40 20,65 C20,85 35,95 50,95 C65,95 80,85 80,65 C80,40 50,10 50,10 Z M50,15 C50,15 70,45 50,90 C50,90 30,45 50,15 Z" fill="#4ade80"/>
                        <path d="M50,15 C50,15 70,45 50,90 L50,15 Z" fill="#22c55e"/>
                    </svg>
                </div>
                MongoDB
            </div>
            <!-- Database Cylinder Graphic -->
            <svg class="bg-graphic" viewBox="0 0 200 200">
                <defs>
                    <linearGradient id="db-grad-front" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#14532d"/>
                        <stop offset="25%" stop-color="#22c55e"/>
                        <stop offset="65%" stop-color="#15803d"/>
                        <stop offset="100%" stop-color="#064e3b"/>
                    </linearGradient>
                    <linearGradient id="db-grad-top" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#4ade80"/>
                        <stop offset="100%" stop-color="#16a34a"/>
                    </linearGradient>
                </defs>
                <g transform="translate(100,100) scale(1.4)" filter="drop-shadow(0 0 15px rgba(34,197,94,0.2))">
                    <!-- Disk 1 (Bottom) -->
                    <ellipse cx="0" cy="40" rx="45" ry="18" fill="#064e3b" />
                    <path d="M-45,40 v-25 a45,18 0 0,0 90,0 v25 a45,18 0 0,1 -90,0" fill="url(#db-grad-front)"/>
                    
                    <!-- Disk 2 (Middle) -->
                    <ellipse cx="0" cy="10" rx="45" ry="18" fill="#064e3b" />
                    <path d="M-45,10 v-25 a45,18 0 0,0 90,0 v25 a45,18 0 0,1 -90,0" fill="url(#db-grad-front)"/>
                    
                    <!-- Disk 3 (Top) -->
                    <ellipse cx="0" cy="-20" rx="45" ry="18" fill="#064e3b" />
                    <path d="M-45,-20 v-25 a45,18 0 0,0 90,0 v25 a45,18 0 0,1 -90,0" fill="url(#db-grad-front)"/>
                    
                    <!-- Top Cap -->
                    <ellipse cx="0" cy="-45" rx="45" ry="18" fill="url(#db-grad-top)" />
                    <ellipse cx="0" cy="-45" rx="38" ry="14" fill="none" stroke="#86efac" stroke-width="1.5" opacity="0.7" />
                </g>
            </svg>
        </div>

        <!-- CARD 1: MERN Full Stack (Top-most) -->
        <div class="card mern">
            <div class="ambient-glow"></div>
            
            <svg class="mern-wave-bg" viewBox="0 0 540 340" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="wave-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#4ade80" />
                        <stop offset="40%" stop-color="#06b6d4" />
                        <stop offset="100%" stop-color="#3b82f6" />
                    </linearGradient>
                    <linearGradient id="wave-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#3b82f6" />
                        <stop offset="100%" stop-color="#10b981" />
                    </linearGradient>
                    <filter id="wave-glow">
                        <feGaussianBlur stdDeviation="6" result="blur"/>
                        <feMerge>
                            <feMergeNode in="blur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                
                <!-- Background subtle waves -->
                <path d="M-50,350 C100,180 250,280 550,150 L550,350 Z" fill="rgba(6, 182, 212, 0.15)"/>
                <path d="M-50,320 C150,320 250,160 550,60 L550,350 L-50,350 Z" fill="rgba(74, 222, 128, 0.08)"/>
                
                <!-- Main sharp glowing lines -->
                <path d="M-20,290 C120,310 280,220 550,100" fill="none" stroke="url(#wave-grad-1)" stroke-width="4" filter="url(#wave-glow)"/>
                <path d="M-20,310 C160,250 240,290 550,140" fill="none" stroke="url(#wave-grad-2)" stroke-width="2.5" filter="url(#wave-glow)" opacity="0.9"/>
                <path d="M50,340 C200,260 300,240 550,180" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" filter="url(#wave-glow)"/>
                
                <!-- Magic Dust -->
                <circle cx="280" cy="230" r="3" fill="#fff" filter="url(#wave-glow)"/>
                <circle cx="420" cy="140" r="2" fill="#4ade80" filter="url(#wave-glow)"/>
                <circle cx="480" cy="200" r="2.5" fill="#06b6d4" opacity="0.8"/>
                <circle cx="180" cy="270" r="2" fill="#3b82f6" filter="url(#wave-glow)"/>
            </svg>

            <div class="mern-content">
                <h2 class="mern-subtitle">Full Stack</h2>
                <h1 class="mern-title">MERN</h1>
                
                <div class="mern-badges">
                    <!-- Mongo Badge -->
                    <div class="badge">
                        <svg viewBox="0 0 100 100">
                            <path d="M50,10 C50,10 20,40 20,65 C20,85 35,95 50,95 C65,95 80,85 80,65 C80,40 50,10 50,10 Z M50,15 C50,15 70,45 50,90 C50,90 30,45 50,15 Z" fill="#4ade80"/>
                            <path d="M50,15 C50,15 70,45 50,90 L50,15 Z" fill="#22c55e"/>
                        </svg>
                    </div>
                    <!-- Express Badge -->
                    <div class="badge">
                        <svg viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#d1d5db" stroke-width="6"/>
                            <text x="50" y="52" font-size="40" font-weight="800" font-family="Inter" fill="#d1d5db" text-anchor="middle" dominant-baseline="central" letter-spacing="-2px">ex</text>
                        </svg>
                    </div>
                    <!-- React Badge -->
                    <div class="badge">
                        <svg viewBox="-11.5 -10.23174 23 20.46348" fill="#38bdf8">
                            <circle cx="0" cy="0" r="2.05"/>
                            <g stroke="#38bdf8" stroke-width="1.5" fill="none">
                                <ellipse rx="11" ry="4.2"/>
                                <ellipse rx="11" ry="4.2" transform="rotate(60)"/>
                                <ellipse rx="11" ry="4.2" transform="rotate(120)"/>
                            </g>
                        </svg>
                    </div>
                    <!-- Node Badge -->
                    <div class="badge">
                        <svg viewBox="0 0 128 128" fill="#4ade80">
                            <path d="M63.886 1.134C62.062 1.134 60.301 1.6 58.74 2.45L9.303 29.58A10.87 10.87 0 0 0 3.88 38.65v50.69a10.87 10.87 0 0 0 5.424 9.07l49.436 27.13a10.87 10.87 0 0 0 10.518 0l49.436-27.13a10.87 10.87 0 0 0 5.424-9.07V38.65a10.87 10.87 0 0 0-5.424-9.07L69.257 2.45c-1.56-.85-3.32-1.316-5.37-1.316Z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
