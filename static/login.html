<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GradStudio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 400px; }
        h1 { font-size: 22px; margin-bottom: 8px; color: #0f172a; }
        p { font-size: 14px; color: #64748b; margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 500; color: #334155; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
        input:focus { outline: none; border-color: #3b82f6; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        button:hover { background: #2563eb; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Admin Login</h1>
        <p>Sign in to access the admin panel</p>
        <div class="error" id="error"></div>
        <form id="login-form">
            <label>Email</label>
            <input type="email" id="email" required autofocus>
            <label>Password</label>
            <input type="password" id="password" required>
            <button type="submit" id="submit-btn">Sign In</button>
        </form>
    </div>
    <script>
        const API_BASE = window.location.protocol === 'file:' ? 'https://learning-platform-api-dev.sabareeshrao.workers.dev' : '';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errEl = document.getElementById('error');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const res = await fetch(API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok && data.accessToken) {
                    localStorage.setItem('lp_auth_token', data.accessToken);
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('lp_is_logged_in', 'true');
                    // Redirect to original page or default
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect') || (window.location.protocol === 'file:' ? new URL('admin-edit.html', window.location.href).href : '/admin-edit.html');
                    window.location.href = redirect;
                } else {
                    errEl.textContent = data.error || 'Invalid credentials';
                    errEl.style.display = 'block';
                }
            } catch (err) {
                errEl.textContent = 'Connection error. Try again.';
                errEl.style.display = 'block';
            }
            btn.disabled = false;
            btn.textContent = 'Sign In';
        });
    </script>
</body>
</html>
