<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk JSON Import - Learning Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --error: #ef4444;
            --border: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 i {
            color: var(--accent);
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 i {
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea {
            min-height: 200px;
            resize: vertical;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            padding: 12px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .nav {
            margin-bottom: 24px;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .nav a:hover {
            color: var(--accent);
        }

        .example {
            margin-top: 20px;
            padding: 16px;
            background: var(--bg-primary);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .example h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .example pre {
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .example-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .example-tab {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .example-tab:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .example-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <nav class="nav">
            <a href="/"><i class="fas fa-arrow-left"></i> Back to Platform</a>
        </nav>

        <h1><i class="fas fa-file-import"></i> Bulk JSON Import</h1>

        <div class="card" style="margin-bottom: 24px;">
            <h2><i class="fas fa-magic"></i> JSON Generator (Simulations)</h2>
            <div class="form-group">
                <label>Paste File Paths (one per line)</label>
                <textarea id="path-input"
                    placeholder="C:\simulations\aws\ec2-basics.html&#10;C:\simulations\aws\s3-intro.html"
                    style="min-height: 120px;"></textarea>
            </div>
            <div class="form-group">
                <label>Course ID</label>
                <input type="text" id="gen-course-id" value="aws" placeholder="aws">
            </div>
            <div class="form-group">
                <label>Section ID</label>
                <input type="text" id="gen-section-id" value="aws-sec-001" placeholder="aws-sec-001">
            </div>
            <button type="button" onclick="generateJSON()"><i class="fas fa-wand-magic-sparkles"></i> Generate
                JSON</button>
        </div>

        <div class="card">
            <h2><i class="fas fa-database"></i> Import Data</h2>
            <form id="bulk-form">
                <div class="form-group">
                    <label>Import Type</label>
                    <select name="type" id="bulk-type" required>
                        <option value="courses">Courses</option>
                        <option value="sections">Sections</option>
                        <option value="simulations">Simulations</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>JSON Array</label>
                    <textarea name="data" id="bulk-data" placeholder='Paste your JSON array here...'></textarea>
                </div>
                <button type="submit"><i class="fas fa-upload"></i> Import Data</button>
                <div class="status" id="bulk-status"></div>
            </form>

            <div class="example">
                <h3>Example JSON Format</h3>
                <div class="example-tabs">
                    <button type="button" class="example-tab active" data-type="courses">Courses</button>
                    <button type="button" class="example-tab" data-type="sections">Sections</button>
                    <button type="button" class="example-tab" data-type="simulations">Simulations</button>
                </div>
                <pre id="example-json">[
  {
    "id": "aws",
    "title": "AWS Service Catalog",
    "icon_class": "fa-brands fa-aws",
    "display_order": 1
  }
]</pre>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';

        // Generate JSON from file paths
        function generateJSON() {
            const pathInput = document.getElementById('path-input').value.trim();
            const courseId = document.getElementById('gen-course-id').value.trim() || 'aws';
            const sectionId = document.getElementById('gen-section-id').value.trim() || 'aws-sec-001';

            if (!pathInput) {
                alert('Please paste file paths first');
                return;
            }

            const paths = pathInput.split('\n').filter(p => p.trim());
            const items = paths.map((path, index) => {
                // Extract filename from path (handles both / and \)
                const filename = path.split(/[/\\]/).pop();
                // Remove extension
                const nameWithoutExt = filename.replace(/\.[^.]+$/, '');
                // Generate slug (lowercase, replace spaces/special chars with hyphens)
                const slug = nameWithoutExt.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

                return {
                    course_id: courseId,
                    section_id: sectionId,
                    title: nameWithoutExt,
                    slug: slug,
                    link: `simulations/${courseId}/${filename}`,
                    has_simulation: true,
                    display_order: index + 1
                };
            });

            // Auto-fill JSON textarea and switch to simulations
            document.getElementById('bulk-data').value = JSON.stringify(items, null, 2);
            document.getElementById('bulk-type').value = 'simulations';
        }

        // Example JSON for each type
        const examples = {
            courses: `[
  {
    "id": "aws",
    "title": "AWS Service Catalog",
    "icon_class": "fa-brands fa-aws",
    "display_order": 1
  }
]`,
            sections: `[
  {
    "id": "aws-sec-001",
    "course_id": "aws",
    "title": "Cloud Foundations",
    "display_order": 1
  }
]`,
            simulations: `[
  {
    "course_id": "aws",
    "section_id": "aws-sec-001",
    "title": "EC2 Basics",
    "slug": "ec2-basics",
    "link": "simulations/aws/ec2-basics.html",
    "has_simulation": true
  }
]`
        };

        // Show status message
        function showStatus(elementId, success, message) {
            const el = document.getElementById(elementId);
            el.className = `status ${success ? 'success' : 'error'}`;
            el.textContent = message;
        }

        // Update example when type changes
        document.getElementById('bulk-type').addEventListener('change', (e) => {
            document.getElementById('example-json').textContent = examples[e.target.value];

            // Update active tab
            document.querySelectorAll('.example-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.type === e.target.value);
            });
        });

        // Example tab clicks
        document.querySelectorAll('.example-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const type = tab.dataset.type;
                document.getElementById('bulk-type').value = type;
                document.getElementById('example-json').textContent = examples[type];

                document.querySelectorAll('.example-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });

        // Form submission
        document.getElementById('bulk-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const type = form.type.value;
            const submitBtn = form.querySelector('button[type="submit"]');

            let data;
            try {
                data = JSON.parse(form.data.value);
            } catch (err) {
                showStatus('bulk-status', false, 'Invalid JSON format: ' + err.message);
                return;
            }

            if (!Array.isArray(data)) {
                showStatus('bulk-status', false, 'JSON must be an array');
                return;
            }

            if (data.length === 0) {
                showStatus('bulk-status', false, 'JSON array is empty');
                return;
            }

            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Importing...';

            try {
                const res = await fetch(`${API_BASE}/api/admin/bulk-import`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, items: data })
                });
                const result = await res.json();

                if (res.ok) {
                    showStatus('bulk-status', true, `Successfully imported ${result.inserted} ${type}!`);
                    form.data.value = '';
                } else {
                    showStatus('bulk-status', false, result.error || 'Failed to import');
                }
            } catch (err) {
                showStatus('bulk-status', false, 'Network error: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-upload"></i> Import Data';
            }
        });
    </script>
</body>

</html>
